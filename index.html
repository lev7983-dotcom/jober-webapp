<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jober Тест</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #000;
            color: #fff;
            padding: 20px;
            font-family: -apple-system, sans-serif;
        }
        button {
            background: #0A84FF;
            color: white;
            border: none;
            padding: 20px;
            font-size: 20px;
            border-radius: 14px;
            width: 100%;
            margin-top: 20px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: #1C1C1E;
            color: white;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Тест отправки</h1>
    
    <input type="text" id="title" placeholder="Название" value="Тест">
    <input type="text" id="company" placeholder="Компания" value="Тест">
    <input type="text" id="salary" placeholder="Зарплата" value="1000">
    <input type="text" id="location" placeholder="Город" value="Москва">
    <input type="text" id="phone" placeholder="Телефон" value="123">
    
    <button id="sendBtn">ОТПРАВИТЬ ВАКАНСИЮ</button>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        document.getElementById('sendBtn').addEventListener('click', () => {
            const data = {
                action: 'create_vacancy',
                title: document.getElementById('title').value,
                company: document.getElementById('company').value,
                salary: document.getElementById('salary').value,
                location: document.getElementById('location').value,
                description: 'Тест',
                phone: document.getElementById('phone').value,
                category: 'Другое'
            };
            
            tg.sendData(JSON.stringify(data));
            tg.close();
        });
    </script>
</body>
</html>
