<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jober</title>
    <style>
        body {
            background: #000;
            color: #fff;
            padding: 20px;
            font-family: -apple-system, sans-serif;
        }
        input, textarea, select {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: #1C1C1E;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #0A84FF;
            color: white;
            padding: 20px;
            width: 100%;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Создание вакансии</h1>
    
    <input type="text" id="title" placeholder="Название" value="Тест">
    <input type="text" id="company" placeholder="Компания" value="Тест">
    <input type="text" id="salary" placeholder="Зарплата" value="1000">
    <input type="text" id="location" placeholder="Город" value="Москва">
    <input type="text" id="phone" placeholder="Телефон" value="123">
    
    <button onclick="sendToBot()">ОТПРАВИТЬ</button>
    
    <script>
        function sendToBot() {
            const title = document.getElementById('title').value;
            const company = document.getElementById('company').value;
            const salary = document.getElementById('salary').value;
            const location = document.getElementById('location').value;
            const phone = document.getElementById('phone').value;
            
            const text = `/start ${title} | ${company} | ${salary} | ${location} | ${phone}`;
            
            // Открываем бота с готовым сообщением
            window.open(`https://t.me/WorkEKBl_bot?text=${encodeURIComponent(text)}`, '_self');
        }
    </script>
</body>
</html>
