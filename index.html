<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jober Тест</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #000;
            color: #fff;
            padding: 20px;
            font-family: -apple-system, sans-serif;
        }
        input, textarea, select {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: #1C1C1E;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        .status {
            color: #0A84FF;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Создание вакансии</h1>
    
    <input type="text" id="title" placeholder="Название" value="Тест">
    <input type="text" id="company" placeholder="Компания" value="Тест">
    <input type="text" id="salary" placeholder="Зарплата" value="1000">
    <input type="text" id="location" placeholder="Город" value="Москва">
    <select id="category">
        <option value="Рестораны/Кафе">Рестораны/Кафе</option>
        <option value="IT/Технологии">IT/Технологии</option>
        <option value="Другое">Другое</option>
    </select>
    <textarea id="description" placeholder="Описание">Тест</textarea>
    <input type="text" id="phone" placeholder="Телефон" value="123">
    
    <div class="status" id="status">Заполните данные и нажмите кнопку внизу</div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Настраиваем главную кнопку Telegram
        tg.MainButton.setText('ОТПРАВИТЬ ВАКАНСИЮ');
        tg.MainButton.show();
        tg.MainButton.enable();
        
        // Обработчик нажатия на главную кнопку
        tg.MainButton.onClick(() => {
            const data = {
                action: 'create_vacancy',
                title: document.getElementById('title').value,
                company: document.getElementById('company').value,
                salary: document.getElementById('salary').value,
                location: document.getElementById('location').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                phone: document.getElementById('phone').value
            };
            
            document.getElementById('status').innerText = 'Отправка...';
            
            // Отправляем данные
            tg.sendData(JSON.stringify(data));
            
            // Закрываем через 1 секунду
            setTimeout(() => {
                tg.close();
            }, 1000);
        });
    </script>
</body>
</html>
