<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jober - Создание вакансии</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <span class="logo-text">Jober</span>
                <span class="logo-subtitle">мини-приложение</span>
            </div>
        </header>
        <main class="main">
            <h1>Создание вакансии</h1>
            <p>Заполните форму ниже, чтобы разместить вакансию.</p>
            <form id="vacancyForm">
                <div class="form-group">
                    <label>Фотографии <span>(0/8)</span></label>
                    <p class="hint">Добавьте фотографии (до 8 файлов, макс 10MB)</p>
                    <p class="note">⭐ Первое фото будет обложкой</p>
                    <div class="photo-grid" id="photoGrid"></div>
                    <button type="button" class="btn-add" id="addPhotoBtn">+ Добавить фотографии</button>
                    <input type="file" id="photoInput" accept="image/*" multiple style="display: none">
                </div>
                <div class="form-group">
                    <label>Название вакансии *</label>
                    <input type="text" id="title" placeholder="Например: Повар горячего цеха" required>
                </div>
                <div class="form-group">
                    <label>Компания *</label>
                    <input type="text" id="company" placeholder="Название компании" required>
                </div>
                <div class="form-group">
                    <label>Зарплата *</label>
                    <input type="text" id="salary" placeholder="от 5 000 ₽" required>
                </div>
                <div class="form-group">
                    <label>Город *</label>
                    <input type="text" id="location" placeholder="Москва, Цветной бульвар д. 23" required>
                </div>
                <div class="form-group">
                    <label>График работы</label>
                    <select id="schedule">
                        <option value="">Выберите график</option>
                        <option value="Полный день">Полный день</option>
                        <option value="Сменный график">Сменный график</option>
                        <option value="Удаленная работа">Удаленная работа</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Категория</label>
                    <select id="category">
                        <option value="">Выберите категорию</option>
                        <option value="Рестораны/Кафе">Рестораны/Кафе</option>
                        <option value="IT/Технологии">IT/Технологии</option>
                        <option value="Ритейл">Ритейл</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Опыт работы</label>
                    <select id="experience">
                        <option value="">Выберите опыт</option>
                        <option value="Без опыта">Без опыта</option>
                        <option value="От 1 до 2 лет">От 1 до 2 лет</option>
                        <option value="От 2 до 3 лет">От 2 до 3 лет</option>
                        <option value="От 3 лет">От 3 лет</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Описание вакансии *</label>
                    <textarea id="description" rows="5" placeholder="Опишите обязанности и условия..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Контактный телефон *</label>
                    <input type="tel" id="phone" placeholder="+7 (999) 999-99-99" required>
                </div>
                <button type="submit" class="btn-submit">Опубликовать вакансию</button>
            </form>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
