<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jober - Создание вакансии</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <div class="close-header">
            <button class="close-btn" id="closeAppBtn">Закрыть</button>
        </div>
        
        <header class="header">
            <div class="logo">
                <span class="logo-text">Jober</span>
                <span class="logo-subtitle">мини-приложение</span>
            </div>
        </header>
        
        <main class="main">
            <h1>Создание вакансии</h1>
            <p>Заполните форму ниже, чтобы разместить вакансию.</p>
            
            <form id="vacancyForm">
                <div class="form-group">
                    <label>Название *</label>
                    <input type="text" id="title" placeholder="Например: Повар горячего цеха" required>
                </div>
                
                <div class="form-group">
                    <label>Компания *</label>
                    <input type="text" id="company" placeholder="Название компании" required>
                </div>
                
                <div class="form-group">
                    <label>Зарплата *</label>
                    <input type="text" id="salary" placeholder="от 5 000 ₽" required>
                </div>
                
                <div class="form-group">
                    <label>Город *</label>
                    <input type="text" id="location" placeholder="Москва, Цветной бульвар д. 23" required>
                </div>
                
                <div class="form-group">
                    <label>Категория *</label>
                    <select id="category" required>
                        <option value="">Выберите категорию</option>
                        <option value="Рестораны/Кафе">Рестораны/Кафе</option>
                        <option value="IT/Технологии">IT/Технологии</option>
                        <option value="Ритейл">Ритейл</option>
                        <option value="Строительство">Строительство</option>
                        <option value="Медицина">Медицина</option>
                        <option value="Образование">Образование</option>
                        <option value="Другое">Другое</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Описание *</label>
                    <textarea id="description" rows="4" placeholder="Опишите обязанности и условия..." required></textarea>
                </div>
                
                <div class="form-group">
                    <label>Телефон *</label>
                    <input type="tel" id="phone" placeholder="+7 (999) 999-99-99" required>
                </div>
                
                <button type="submit" class="btn-submit" id="submitBtn" disabled>Загрузка...</button>
            </form>
        </main>
    </div>
    
    <script>
        // Ждём готовности Telegram WebApp
        let tg = null;
        
        function initWebApp() {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                // Активируем кнопку
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Опубликовать вакансию';
                
                // Закрытие
                document.getElementById('closeAppBtn').onclick = () => tg.close();
                
                // Отправка формы
                document.getElementById('vacancyForm').onsubmit = function(e) {
                    e.preventDefault();
                    
                    const data = {
                        action: 'create_vacancy',
                        title: document.getElementById('title').value.trim(),
                        company: document.getElementById('company').value.trim(),
                        salary: document.getElementById('salary').value.trim(),
                        location: document.getElementById('location').value.trim(),
                        category: document.getElementById('category').value,
                        description: document.getElementById('description').value.trim(),
                        phone: document.getElementById('phone').value.trim()
                    };
                    
                    if (!data.title || !data.company || !data.salary || !data.location || !data.category || !data.description || !data.phone) {
                        tg.showAlert('Заполните все поля');
                        return;
                    }
                    
                    tg.sendData(JSON.stringify(data));
                    tg.close();
                };
            } else {
                setTimeout(initWebApp, 100);
            }
        }
        
        initWebApp();
    </script>
</body>
</html>
