<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jober - Создание вакансии</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <div class="close-header">
            <button class="close-btn" id="closeAppBtn">Закрыть</button>
        </div>
        
        <header class="header">
            <div class="logo">
                <span class="logo-text">Jober</span>
                <span class="logo-subtitle">мини-приложение</span>
            </div>
        </header>
        
        <main class="main">
            <h1>Создание вакансии</h1>
            <p>Заполните форму ниже, чтобы разместить вакансию.</p>
            
            <form id="vacancyForm">
                <div class="form-group">
                    <label>Название *</label>
                    <input type="text" id="title" placeholder="Например: Повар горячего цеха" required>
                </div>
                
                <div class="form-group">
                    <label>Компания *</label>
                    <input type="text" id="company" placeholder="Название компании" required>
                </div>
                
                <div class="form-group">
                    <label>Зарплата *</label>
                    <input type="text" id="salary" placeholder="от 5 000 ₽" required>
                </div>
                
                <div class="form-group">
                    <label>Город *</label>
                    <input type="text" id="location" placeholder="Москва, Цветной бульвар д. 23" required>
                </div>
                
                <div class="form-group">
                    <label>Категория *</label>
                    <select id="category" required>
                        <option value="">Выберите категорию</option>
                        <option value="Рестораны/Кафе">Рестораны/Кафе</option>
                        <option value="IT/Технологии">IT/Технологии</option>
                        <option value="Ритейл">Ритейл</option>
                        <option value="Строительство">Строительство</option>
                        <option value="Медицина">Медицина</option>
                        <option value="Образование">Образование</option>
                        <option value="Другое">Другое</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Описание *</label>
                    <textarea id="description" rows="4" placeholder="Опишите обязанности и условия..." required></textarea>
                </div>
                
                <div class="form-group">
                    <label>Телефон *</label>
                    <input type="tel" id="phone" placeholder="+7 (999) 999-99-99" required>
                </div>
                
                <button type="submit" class="btn-submit">Опубликовать вакансию</button>
            </form>
        </main>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        document.getElementById('closeAppBtn').addEventListener('click', () => tg.close());
        
        document.getElementById('vacancyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const data = {
                action: 'create_vacancy',
                title: document.getElementById('title').value,
                company: document.getElementById('company').value,
                salary: document.getElementById('salary').value,
                location: document.getElementById('location').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                phone: document.getElementById('phone').value
            };
            
            // ВАРИАНТ 1: с задержкой
            tg.sendData(JSON.stringify(data));
            setTimeout(() => tg.close(), 500);
            
            // ВАРИАНТ 2: с колбэком (удалите вариант 1 и раскомментируйте этот)
            // tg.sendData(JSON.stringify(data), (result) => {
            //     tg.close();
            // });
        });
    </script>
</body>
</html>
