<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jober</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; padding: 16px; font-family: -apple-system, sans-serif; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #1C1C1E; color: #fff; box-sizing: border-box; }
        button { background: #0A84FF; color: #fff; padding: 16px; width: 100%; border: none; border-radius: 8px; font-size: 16px; margin-top: 16px; }
    </style>
</head>
<body>
    <h2>Создание вакансии</h2>
    
    <input id="title" placeholder="Название" value="Тест">
    <input id="company" placeholder="Компания" value="Тест">
    <input id="salary" placeholder="Зарплата" value="1000">
    <input id="location" placeholder="Город" value="Москва">
    <input id="phone" placeholder="Телефон" value="123">
    
    <button id="submit">Опубликовать</button>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        document.getElementById('submit').onclick = function() {
            const data = {
                title: document.getElementById('title').value,
                company: document.getElementById('company').value,
                salary: document.getElementById('salary').value,
                location: document.getElementById('location').value,
                phone: document.getElementById('phone').value
            };
            
            tg.sendData(JSON.stringify(data));
            tg.close();
        };
    </script>
</body>
</html>
